<h2 mat-dialog-title>{{ isEditMode ? 'Edit Category' : 'Add Category' }}</h2>

<mat-dialog-content>
  <form [formGroup]="categoryForm" class="category-form">
    <!-- Category Name -->
    <mat-form-field class="full-width">
      <mat-label>Category Name</mat-label>
      <input matInput formControlName="categoryName" required>
      <mat-error *ngIf="categoryForm.get('categoryName')?.hasError('required')">
        Category name is required
      </mat-error>
    </mat-form-field>

    <!-- Description -->
    <mat-form-field class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" placeholder="Optional category description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()" [disabled]="isLoading">Cancel</button>
  <button mat-raised-button color="primary" type="button" (click)="onSave()" [disabled]="categoryForm.invalid || isLoading">
    <mat-icon *ngIf="isLoading">hourglass_empty</mat-icon>
    {{ isLoading ? 'Saving...' : 'Save' }}
  </button>
</mat-dialog-actions>
