<div class="categories-container">
  <div class="page-header">
    <h1 class="page-title">Categories</h1>
    <button
      *ngIf="canEditCategories"
      mat-raised-button
      color="primary"
      type="button"
      (click)="openAddCategoryDialog()"
      class="add-button">
      <mat-icon>add</mat-icon>
      Add category
    </button>
  </div>

  <mat-card class="categories-card">
    <mat-card-content>
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
        <p>Loading categories...</p>
      </div>

      <table 
        *ngIf="!isLoading" 
        mat-table 
        [dataSource]="categoriesDataSource" 
        class="categories-table">
        
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Category Name</th>
          <td mat-cell *matCellDef="let category">{{ category.name }}</td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let category">{{ category.description || 'N/A' }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let category">
            <button
              mat-icon-button
              color="primary"
              type="button"
              (click)="openEditCategoryDialog(category)"
              *ngIf="canEditCategories"
              matTooltip="Edit category">
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              type="button"
              (click)="deleteCategory(category.id!)"
              *ngIf="canDeleteCategories"
              matTooltip="Delete category">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="!isLoading && categoriesDataSource.data.length === 0" class="empty-state">
        <mat-icon class="empty-icon">category</mat-icon>
        <h3>No categories yet</h3>
        <p *ngIf="canEditCategories">Use <strong>Add category</strong> above to create one.</p>
        <p *ngIf="!canEditCategories">Ask an administrator to add categories.</p>
        <button
          *ngIf="canEditCategories"
          mat-raised-button
          color="primary"
          type="button"
          (click)="openAddCategoryDialog()">
          <mat-icon>add</mat-icon>
          Add category
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
